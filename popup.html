<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리트윗 청소기</title>
    <style>
        body {
            width: 260px;
            font-family: Arial, sans-serif;
            padding: 14px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        p {
            font-size: 13px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            cursor: pointer;
        }

        #startBtn {
            background: #111;
            color: white;
            border: none;
        }

        #stopBtn {
            background: #eee;
            border: 1px solid #ccc;
        }

        #status {
            margin-top: 10px;
            font-size: 13px;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <h1>동식이는 리트윗을 청소해</h1>

    <p>
        X 프로필/타임라인 페이지에서<br>
        현재 보이는 리트윗 취소 버튼을 찾아<br>
        하나씩 취소합니다.
    </p>

    <button id="startBtn">리트윗 청소 시작</button>
    <button id="stopBtn">중지</button>

    <div id="status">대기 중</div>

    <script src="popup.js"></script>
</body>
</html>
